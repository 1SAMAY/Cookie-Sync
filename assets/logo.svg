    <circle cx="24" cy="17" r="7" fill="#12805C"/>
    <text x="42" y="23" fill="#1E40AF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="0">SECURITY LAB</text>
  </g>
